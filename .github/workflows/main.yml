name: Build de4dot (Windows Server 2022)

on:
  workflow_dispatch:
  push:
    branches: [ "master" ]

jobs:
  build-windows:
    runs-on: windows-2022

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '6.0.x' # de4dot targets .NET 6/7; use 6.0 for max compatibility

      - name: Find Project File
        id: find_proj
        shell: pwsh
        run: |
          $proj = Get-ChildItem -Recurse -Filter "de4dot.csproj" | Select-Object -First 1 -ExpandProperty FullName
          echo "project_path=$proj" >> $env:GITHUB_OUTPUT

      - name: Restore dependencies
        run: dotnet restore ${{ steps.find_proj.outputs.project_path }}

      - name: Build Release
        run: dotnet build ${{ steps.find_proj.outputs.project_path }} -c Release --no-restore

      - name: Publish Self-Contained (win-x64)
        run: |
          dotnet publish ${{ steps.find_proj.outputs.project_path }} `
            -c Release `
            -r win-x64 `
            --self-contained true `
            -p:PublishSingleFile=true `
            -p:EnableCompressionInSingleFile=true `
            -o ./publish

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: de4dot-windows-2022
          path: ./publish
          retention-days: 30
          if-no-files-found: error
